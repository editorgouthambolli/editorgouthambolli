<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Professional Portfolio</title>
    <style>
        :root { --purple: #7a4ed9; --glass: rgba(255,255,255,0.8); }
        body { margin: 0; background: linear-gradient(180deg, #fff, #e9e2ff); font-family: 'Segoe UI', sans-serif; color: #333; }
        
        /* Glassy Header */
        header { background: #fff; padding: 40px 20px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(122,78,217,0.1); }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--purple); object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Content Boxes */
        .glass-box { background: var(--glass); backdrop-filter: blur(15px); border-radius: 25px; padding: 25px; margin: 20px 15px; border: 1px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .tag { background: var(--purple); color: #fff; font-size: 11px; padding: 5px 15px; border-radius: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        
        /* Video Player */
        .video-container { margin: 0 15px; border-radius: 25px; overflow: hidden; background: #000; aspect-ratio: 9/16; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        iframe { width: 100%; height: 100%; border: none; }

        /* Floating WA Button */
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <img id="p-img" src="https://via.placeholder.com/150" class="profile-img">
        <h1 style="color:var(--purple); margin: 15px 0;">Goutham Bolli <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg" width="22"></h1>
        <p style="font-size: 10px; letter-spacing: 3px; color: #888; font-weight: bold;">VIDEO EDITOR & WRITER</p>
    </header>

    <div class="glass-box">
        <span class="tag">ABOUT ME</span>
        <p id="p-bio" style="line-height: 1.7; font-size: 15px;">Loading your story...</p>
    </div>

    <div style="text-align:center; margin: 10px 0;"><span class="tag" style="background:#4a148c;">LATEST WORK</span></div>
    
    <div class="video-container">
        <iframe id="p-video" src=""></iframe>
    </div>

    <div class="glass-box" style="margin-bottom: 80px;">
        <span class="tag">SKILLS</span>
        <p id="p-skills" style="font-size: 14px; font-weight: 500;"></p>
    </div>

    <a id="p-wa" href="#" class="wa-float">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
    </a>

    <script>
        // నీ గూగుల్ షీట్ CSV కన్వర్టర్
        const sheetID = "1K65MH0F0K_Avl6S5ET3qFvGB7QsrSeZtlrtWaeShPAM";
        const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;

        async function syncSite() {
            try {
                const res = await fetch(csvURL);
                const text = await res.text();
                const rows = text.split('\n').map(row => row.replace(/"/g, '').split(','));

                // షీట్ నుండి డేటా మ్యాపింగ్ (Column B)
                document.getElementById('p-bio').innerText = rows[1][1]; 
                document.getElementById('p-video').src = "https://www.youtube.com/embed/" + rows[2][1] + "?autoplay=1&mute=1&loop=1";
                document.getElementById('p-img').src = rows[3][1];
                document.getElementById('p-wa').href = "https://wa.me/91" + rows[4][1];
                document.getElementById('p-skills').innerText = rows[5][1];
            } catch (err) {
                console.log("Error loading data");
            }
        }
        syncSite();
    </script>
</body>
</html>
