<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Cinematic Storyteller</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            /* పర్పుల్ మరియు వైట్ కలర్ కాంబినేషన్ */
            --purple-deep: #1a0129; /* థిక్ పర్పుల్ (Premiere Pro Style) */
            --purple-light: #3e0a3e; /* లైట్ పర్పుల్ */
            --white: #ffffff;
            --glass-white: rgba(255, 255, 255, 0.03); /* గ్లాస్ ఎఫెక్ట్ కోసం */
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            /* సినిమాటిక్ గ్రేడియంట్ బ్యాక్‌గ్రౌండ్ (పర్పుల్ & బ్లాక్ మిక్స్) */
            background: radial-gradient(circle at top right, var(--purple-light), var(--purple-deep) 50%, #000000 100%);
            background-attachment: fixed;
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* సినిమాటిక్ గ్లాసీ హెడర్ */
        header {
            text-align: center;
            padding: 100px 20px;
            background: var(--glass-white);
            backdrop-filter: blur(25px); /* గ్లాస్ ఫినిష్ */
            border-bottom: 1px solid var(--glass-border);
            position: relative;
        }

        /* పేరు మరియు ట్యాగ్‌లైన్ డిజైన్ */
        .name {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 10vw, 5.5rem);
            color: var(--white);
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .tagline {
            letter-spacing: 8px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1 class="name">Goutham Bolli</h1>
        <div class="tagline">The Romantic Cinematic Storyteller</div>
    </header>
</body>
</html>
