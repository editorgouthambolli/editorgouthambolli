<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goutham Bolli | Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --purple:#2b0a3d;
    --black:#000;
    --gold:#ffcc00;
    --glass:rgba(255,255,255,0.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* BODY */
body{
    background: radial-gradient(circle at top, #2b0a3d 0%, #0d001a 60%, #000 100%);
    color:white;
    overflow-x:hidden;
    padding-bottom:100px;
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    position:fixed;
    width:100%;
    top:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(20px);
    z-index:1000;
}
.logo{
    font-size:26px;
    font-weight:900;
    color:var(--gold);
}

/* HERO */
.hero{
    margin-top:70px;
    padding:15px;
}
.banner{
    height:220px;
    border-radius:25px;
    background:url('https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?auto=format&fit=crop&q=80') center/cover;
    position:relative;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
}
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    background:linear-gradient(transparent,rgba(0,0,0,0.95));
}
.overlay h1{
    font-size:22px;
}
.overlay p{
    font-size:12px;
    opacity:0.7;
    margin-bottom:10px;
}

/* BUTTONS */
.btn{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    font-weight:700;
    margin-right:10px;
    cursor:pointer;
}
.play{background:white;color:black;}
.info{background:rgba(255,255,255,0.2);color:white;}
.btn:hover{transform:scale(1.05);}

/* TITLES */
.section-title{
    margin:25px 20px 10px;
    font-size:18px;
    color:var(--gold);
    text-shadow:0 0 10px rgba(255,204,0,0.6);
}

/* FOLDERS */
.folders{
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:10px 20px;
}
.folder{
    min-width:130px;
    padding:18px;
    border-radius:20px;
    text-align:center;
    background:var(--glass);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.15);
    transition:0.3s;
}
.folder:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px rgba(255,204,0,0.4);
}

/* STORY BOX */
#storyBox{
    display:none;
    margin:15px 20px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    border-left:3px solid var(--gold);
}

/* CARDS */
.cards{
    display:flex;
    overflow-x:auto;
    gap:12px;
    padding:10px 20px;
}
.card{
    min-width:140px;
    height:210px;
    border-radius:18px;
    overflow:hidden;
    position:relative;
}
.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* PLAY BUTTON */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.6);
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* VIDEO */
video{
    width:160px;
    border-radius:15px;
}

/* BOTTOM NAV */
.bottom{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:380px;
    background:rgba(20,20,20,0.8);
    backdrop-filter:blur(30px);
    border-radius:30px;
    display:flex;
    justify-content:space-around;
    padding:15px;
}
</style>
</head>

<body onclick="clickSound()">

<!-- NAV -->
<div class="nav">
    <div class="logo">G</div>
    <div>🔍</div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="banner">
        <div class="overlay">
            <h1>GOUTHAM BOLLI ✔</h1>
            <p>Editor & Content Writer</p>
            <button class="btn play">▶ Play</button>
            <button class="btn info">+ Info</button>
        </div>
    </div>
</div>

<!-- STORY -->
<h2 class="section-title">🎬 My Story</h2>
<div class="folders">
    <div class="folder" onclick="showStory('identity')">👤 Identity</div>
    <div class="folder" onclick="showStory('journey')">🚀 Journey</div>
    <div class="folder" onclick="showStory('break')">💎 Breakthrough</div>
    <div class="folder" onclick="showStory('vision')">🔥 Vision</div>
</div>

<div id="storyBox"></div>

<!-- CATEGORIES -->
<h2 class="section-title">📂 Categories</h2>
<div class="folders">
    <div class="folder">🎬 Short Films</div>
    <div class="folder">📱 Reels</div>
    <div class="folder">🎥 Vlogs</div>
    <div class="folder">⚡ Shorts</div>
</div>

<!-- CONTINUE -->
<h2 class="section-title">🎞️ Continue Watching</h2>
<div class="cards">
    <div class="card">
        <img src="https://via.placeholder.com/150x210">
        <div class="play-btn">▶</div>
    </div>
    <div class="card">
        <img src="https://via.placeholder.com/150x210">
        <div class="play-btn">▶</div>
    </div>
</div>

<!-- PROJECTS -->
<h2 class="section-title">🎥 Project Works</h2>
<div class="cards">
    <video src="video1.mp4" controls></video>
    <video src="video2.mp4" controls></video>
    <video src="video3.mp4" controls></video>
    <video src="video4.mp4" controls></video>
</div>

<!-- BOTTOM -->
<div class="bottom">
    <div>🏠</div>
    <div>🎬</div>
    <div>📞</div>
    <div>👤</div>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
function showStory(type){
    const box = document.getElementById("storyBox");
    box.style.display="block";

    const data={
        identity:"I am Goutham, a passionate Video Editor & Content Writer.",
        journey:"Started from mobile editing and moved to professional tools.",
        break:"Got recognition through short films and creative edits.",
        vision:"To become a cinematic storyteller in the film industry."
    };

    box.innerText=data[type];
}

function clickSound(){
    document.getElementById("sound").play().catch(()=>{});
}
</script>

</body>
</html>
