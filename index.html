<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goutham Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
:root{
--purple:#2b0a3d;
--gold:#ffcc00;
--glass:rgba(255,255,255,0.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BODY */
body{
background: radial-gradient(circle at top,#2b0a3d,#000);
color:white;
overflow:hidden;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#intro h1{
color:var(--gold);
font-size:28px;
letter-spacing:5px;
opacity:0;
transform:translateY(20px);
transition:0.6s;
}

#intro p{
color:rgba(255,204,0,0.6);
font-size:12px;
margin-top:10px;
opacity:0;
transition:0.5s;
}

/* GATE */
#gate{
display:none;
flex-direction:column;
height:100vh;
background:#000;
}

.video-box{
height:60%;
position:relative;
overflow:hidden;
}

.video-box iframe{
width:100%;
height:100%;
border:none;
opacity:0.85;
}

/* TITLE */
.title-card{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(transparent,#000);
}

.glass{
background:var(--glass);
backdrop-filter:blur(15px);
padding:15px;
border-radius:12px;
}

/* PROFILE */
.profile{
height:40%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.profiles{
display:flex;
gap:25px;
margin-top:15px;
}

.profile-box{
width:80px;
height:80px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}

.main-profile{
border:2px solid var(--gold);
color:var(--gold);
}

/* APP */
#app{
display:none;
height:100vh;
overflow-y:auto;
background: radial-gradient(circle at top,#2b0a3d,#000);
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(0,0,0,0.6);
position:sticky;
top:0;
}

.logo{
color:var(--gold);
font-weight:900;
font-size:20px;
}

/* HERO */
.hero{
padding:15px;
}

.banner{
height:200px;
border-radius:20px;
background:url('https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?auto=format&fit=crop&q=80') center/cover;
position:relative;
overflow:hidden;
}

.overlay{
position:absolute;
bottom:0;
padding:20px;
background:linear-gradient(transparent,#000);
width:100%;
}

/* BUTTON */
.btn{
padding:10px 20px;
border:none;
border-radius:10px;
margin-right:10px;
font-weight:700;
cursor:pointer;
}

.play{background:white;color:black;}
.info{background:rgba(255,255,255,0.2);color:white;}

.btn:hover{
transform:scale(1.05);
}

/* SECTIONS */
.title{
margin:20px;
color:var(--gold);
}

/* FOLDERS */
.folders{
display:flex;
gap:15px;
overflow-x:auto;
padding:0 20px;
}

.folder{
min-width:130px;
padding:20px;
background:var(--glass);
border-radius:20px;
text-align:center;
}

/* CARDS */
.cards{
display:flex;
gap:10px;
overflow-x:auto;
padding:0 20px;
}

.card{
min-width:140px;
height:200px;
background:#111;
border-radius:15px;
position:relative;
}

.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* VIDEOS */
video{
width:160px;
border-radius:12px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>GOUTHAM EDITOR</h1>
<p>"Cinematic Storytelling"</p>
<audio id="sound" src="https://www.myinstants.com/media/sounds/netflix-tudum.mp3"></audio>
</div>

<!-- GATE -->
<div id="gate">

<div class="video-box">
<iframe 
src="https://www.youtube.com/embed/OkYXCAz_-Kg?autoplay=1&mute=1&controls=0&loop=1&playlist=OkYXCAz_-Kg"
allow="autoplay">
</iframe>

<div class="title-card">
<div class="glass">
<h2>O CHINNA PREMA KATHA</h2>
<p>My Project is Coming Soon • Edited by Goutham</p>
</div>
</div>
</div>

<div class="profile">
<p style="opacity:0.6;">Who's watching?</p>

<div class="profiles">
<div class="profile-box main-profile" onclick="openApp()">G</div>
<div class="profile-box" style="opacity:0.4;">Kids</div>
</div>

<p style="color:var(--gold);margin-top:10px;">goutham</p>
</div>

</div>

<!-- APP -->
<div id="app">

<div class="nav">
<div class="logo">G</div>
<div>🔍</div>
</div>

<div class="hero">
<div class="banner">
<div class="overlay">
<h2>GOUTHAM BOLLI ✔</h2>
<p>Editor & Content Writer</p>
<button class="btn play">▶ Play</button>
<button class="btn info">+ Info</button>
</div>
</div>
</div>

<h2 class="title">📂 Categories</h2>
<div class="folders">
<div class="folder">🎬 Short Films</div>
<div class="folder">📱 Reels</div>
<div class="folder">🎥 Vlogs</div>
</div>

<h2 class="title">🎞 Continue Watching</h2>
<div class="cards">
<div class="card"><div class="play-btn">▶</div></div>
<div class="card"><div class="play-btn">▶</div></div>
</div>

<h2 class="title">🎥 Project Works</h2>
<div class="cards">
<video src="video1.mp4" controls></video>
<video src="video2.mp4" controls></video>
<video src="video3.mp4" controls></video>
<video src="video4.mp4" controls></video>
</div>

</div>

<script>
window.addEventListener("load", () => {
const intro = document.getElementById("intro");
const gate = document.getElementById("gate");
const sound = document.getElementById("sound");

setTimeout(()=>{
document.querySelector("#intro h1").style.opacity=1;
document.querySelector("#intro h1").style.transform="translateY(0)";
document.querySelector("#intro p").style.opacity=1;
sound.play().catch(()=>{});
},300);

setTimeout(()=>{
intro.style.display="none";
gate.style.display="flex";
},2500);
});

function openApp(){
document.getElementById("gate").style.display="none";
document.getElementById("app").style.display="block";
document.body.style.overflow="auto";
}
</script>

</body>
</html>
