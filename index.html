<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goutham Bolli | Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
:root{
--purple:#1a0129;
--black:#000;
--gold:#ffcc00;
--glass:rgba(255,255,255,0.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: radial-gradient(circle at top,#2b0a3d,#000);
color:white;
overflow-x:hidden;
}

/* HERO VIDEO */
.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero video{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:30px;
background:linear-gradient(transparent,#000);
}

.overlay h1{
font-size:40px;
font-weight:900;
color:var(--gold);
}

.overlay p{
opacity:0.8;
}

/* SECTION */
.section{
padding:50px 20px;
}

/* TITLE */
.title{
font-size:28px;
margin-bottom:20px;
color:var(--gold);
}

/* FEATURED PROJECT */
.featured video{
width:100%;
border-radius:20px;
}

/* ROW */
.row{
display:flex;
gap:15px;
overflow-x:auto;
}

.card{
min-width:160px;
height:220px;
background:var(--glass);
border-radius:20px;
backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:center;
}

/* ABOUT */
.about{
background:var(--glass);
padding:20px;
border-radius:20px;
backdrop-filter:blur(20px);
}

/* CONTACT */
.contact{
text-align:center;
}

.btn{
padding:15px 30px;
background:var(--gold);
border:none;
border-radius:30px;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<video autoplay muted loop>
<source src="hero.mp4" type="video/mp4">
</video>

<div class="overlay">
<h1>GOUTHAM BOLLI</h1>
<p>Video Editor & Content Creator</p>
</div>
</section>

<!-- FEATURED -->
<section class="section">
<h2 class="title">Featured Work</h2>
<div class="featured">
<video controls src="video1.mp4"></video>
</div>
</section>

<!-- CATEGORIES -->
<section class="section">
<h2 class="title">Projects</h2>
<div class="row">
<div class="card">Short Films</div>
<div class="card">Reels</div>
<div class="card">Vlogs</div>
<div class="card">Shorts</div>
</div>
</section>

<!-- ABOUT -->
<section class="section">
<h2 class="title">About Me</h2>
<div class="about">
<p>I am Goutham, a passionate Video Editor creating cinematic stories.</p>
</div>
</section>

<!-- CONTACT -->
<section class="section contact">
<h2 class="title">Work With Me</h2>
<button class="btn" onclick="window.location.href='https://wa.me/918341388567'">
Contact on WhatsApp
</button>
</section>

</body>
</html>
