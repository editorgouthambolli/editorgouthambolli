<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Cinematic Storyteller</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            /* నువ్వు పంపిన స్క్రీన్‌షాట్‌లో ఉన్న పర్ఫెక్ట్ వైట్ & పర్పుల్ గ్రేడియంట్ */
            background: linear-gradient(180deg, #ffffff 0%, #f3e8ff 45%, #d8b4fe 100%);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* సినిమాటిక్ గ్లాసీ ఫినిష్ కార్డ్ */
        .glass-header {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .name {
            font-size: 4.5rem;
            /* పేరుకి క్లీన్ మెటాలిక్ సిల్వర్ లుక్ */
            background: linear-gradient(to bottom, #4c1d95 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: -2px;
            /* సాఫ్ట్ గ్లో */
            filter: drop-shadow(0 5px 15px rgba(139, 92, 246, 0.3));
        }

        .tagline {
            letter-spacing: 12px;
            font-size: 0.75rem;
            color: #5b21b6;
            text-transform: uppercase;
            margin-top: 15px;
            font-weight: 400;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="glass-header">
        <h1 class="name">Goutham Bolli</h1>
        <div class="tagline">THE CINEMATIC STORYTELLER</div>
    </div>

</body>
</html>
