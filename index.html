<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Professional Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e50914;
            --bg-dark: #000;
            --glass: rgba(0, 0, 0, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* --- POSTER GRID BACKGROUND --- */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-0758328f773b/86071465-4d7a-4467-bc6d-0e31804f3b5f/IN-en-20220502-popsignuptwoweeks-perspective_alpha_website_small.jpg');
            background-size: cover;
            opacity: 0.3; /* Subtle grid look */
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, black 90%);
            z-index: -1;
        }

        /* --- NAVIGATION --- */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 24px; font-weight: 700; color: white; letter-spacing: 1px; }
        .logo span { font-size: 30px; font-weight: 900; color: var(--primary-color); }

        /* --- HERO --- */
        .hero { margin-top: 100px; padding: 20px; text-align: center; }
        .hero h1 { font-size: 42px; font-weight: 700; margin-bottom: 10px; }
        .hero p { font-size: 18px; color: #ccc; margin-bottom: 25px; }

        .btn-group { display: flex; justify-content: center; gap: 15px; }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-red { background: var(--primary-color); color: white; }
        .btn-red:hover { background: #b20710; }

        /* --- FOLDERS --- */
        .section-title { margin: 40px 20px 20px; font-size: 22px; position: relative; }
        .folders-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 20px;
            scrollbar-width: none;
        }
        .folder {
            min-width: 140px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 25px 15px;
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }
        .folder:hover { border-color: white; transform: scale(1.05); }

        /* --- VIDEO AREA --- */
        .video-grid { display: none; padding: 20px; }
        .video-card {
            background: #141414;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
        }
        video { width: 100%; border-radius: 5px; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: black;
            padding: 18px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="grid-overlay"></div>

    <div class="nav">
        <div class="logo"><span>N</span> GOUTHAM BOLLI</div>
        <div>🔍</div>
    </div>

    <div class="hero">
        <h1>Goutham Bolli</h1>
        <p>Editor & Content Writer</p>
        <div class="btn-group">
            <button class="btn btn-red" onclick="showCategory('Portfolio')">Get Started ></button>
        </div>
    </div>

    <h2 class="section-title">Browse Categories</h2>
    <div class="folders-container">
        <div class="folder" onclick="showCategory('Short Films')">🎬<br>Short Films</div>
        <div class="folder" onclick="showCategory('Reels')">📱<br>Reels</div>
        <div class="folder" onclick="showCategory('Vlogs')">🎥<br>Vlogs</div>
        <div class="folder" onclick="showCategory('Wedding')">💍<br>Wedding</div>
    </div>

    <div id="videoSection" class="video-grid">
        <h2 id="categoryTitle" style="margin-bottom: 20px;">Projects</h2>
        <div class="video-card">
            <video src="video.mp4" controls></video>
        </div>
    </div>

    <div class="bottom-nav">
        <div>🏠</div>
        <div>🎬</div>
        <div>📱</div>
        <div>👤</div>
    </div>

    <script>
        function showCategory(name) {
            document.getElementById("videoSection").style.display = "block";
            document.getElementById("categoryTitle").innerText = name + " Projects";
            document.getElementById("videoSection").scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
