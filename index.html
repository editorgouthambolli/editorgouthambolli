<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Editor | Portfolio</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --gold: #ffcc00;
        }

        body {
            margin: 0; padding: 0; background: #080808; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }

        /* బ్రౌజర్ వెనకాల టీజర్ వీడియో లేదా డార్క్ గ్రేడియంట్ */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        header { margin-bottom: 50px; text-align: left; }
        header h1 { font-size: 28px; letter-spacing: 2px; color: var(--gold); margin: 0; }

        /* GLASS GRID SYSTEM */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        /* THE MAIN GLASS CARD */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            transition: 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            border-color: rgba(255, 204, 0, 0.4);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        .card-thumb {
            width: 100%; height: 180px; background: #111;
            border-radius: 10px; margin-bottom: 15px;
            object-fit: cover;
        }

        .card-tag {
            font-size: 10px; color: var(--gold); letter-spacing: 1px;
            text-transform: uppercase; font-weight: bold; margin-bottom: 5px;
        }

        .card-title { font-size: 18px; font-weight: 600; margin: 0; color: #fff; }
        .card-desc { font-size: 12px; color: #888; margin-top: 8px; line-height: 1.5; }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <header>
            <h1>GOUTHAM EDITOR</h1>
            <p style="color: #666; font-size: 12px; margin-top: 5px;">MODERN MOTION PORTFOLIO 2026</p>
        </header>

        <div class="project-grid" id="project-container"></div>
    </div>

    <script>
        /* అరేయ్ పాండు, ఇక్కడ ఉంది నీ కస్టమైజేషన్ బాక్స్!
           భవిష్యత్తులో నువ్వు ఏ ప్రాజెక్ట్ యాడ్ చేయాలన్నా, జస్ట్ ఈ కింద ఉన్న 
           లైన్లలో పేరు, ఫోటో లింక్ మారిస్తే చాలు.
        */
        const PROJECT_DATA = [
            {
                title: "ఓ చిన్న ప్రేమ కథ",
                tag: "NEW PROJECT",
                desc: "A cinematic teaser edited with high-end transitions.",
                image: "https://via.placeholder.com/400x225/111/ffcc00?text=O+Chinna+Prema+Katha", // ఇక్కడ నీ టీజర్ థంబ్ నెయిల్ లింక్ ఇవ్వు
                link: "https://youtu.be/OkYXCAz_-Kg"
            },
            {
                title: "Project Sunny",
                tag: "UPCOMING",
                desc: "Minimal motion design work for Project Sunny.",
                image: "https://via.placeholder.com/400x225/111/666?text=Project+Sunny", // ఇక్కడ సన్నీ ఫోటో లింక్ ఇవ్వు
                link: "#"
            },
            {
                title: "STM Project",
                tag: "MOTION DESIGN",
                desc: "Full motion graphic and editing for STM.",
                image: "https://via.placeholder.com/400x225/111/666?text=STM+Project", // ఇక్కడ STM ఫోటో లింక్ ఇవ్వు
                link: "#"
            }
        ];

        // ప్రాజెక్ట్స్ ని డిస్‌ప్లే చేసే ఫంక్షన్
        const container = document.getElementById('project-container');

        PROJECT_DATA.forEach(project => {
            const card = `
                <div class="glass-card" onclick="window.open('${project.link}', '_blank')">
                    <img src="${project.image}" class="card-thumb" alt="${project.title}">
                    <div class="card-tag">${project.tag}</div>
                    <h2 class="card-title">${project.title}</h2>
                    <p class="card-desc">${project.desc}</p>
                </div>
            `;
            container.innerHTML += card;
        });
    </script>
</body>
</html>
