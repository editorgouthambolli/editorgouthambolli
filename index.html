<div id="intro-layer" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:100001; display:flex; justify-content:center; align-items:center; overflow:hidden; font-family: 'Poppins', sans-serif;">
    <div style="text-align: center; padding: 20px;">
        <h1 id="intro-logo" style="color: #ffcc00; font-size: clamp(24px, 6vw, 44px); font-weight: 900; letter-spacing: 12px; margin: 0; text-transform: uppercase; opacity: 0; transform: translateY(15px); transition: all 0.7s cubic-bezier(0.2, 1, 0.3, 1); filter: drop-shadow(0 0 12px rgba(255, 204, 0, 0.6)); white-space: nowrap;">
            Goutham Editor
        </h1>
        <p id="intro-quote" style="color: rgba(255, 204, 0, 0.6); font-size: 10px; letter-spacing: 5px; margin-top: 15px; opacity: 0; text-transform: uppercase; transition: all 0.5s ease-out 0.5s;">
            "Bringing Visions to Life"
        </p>
    </div>
    <audio id="tudum" src="https://www.myinstants.com/media/sounds/netflix-tudum.mp3"></audio>
</div>

<div id="app-gate" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:100000; display:none; flex-direction:column; overflow:hidden; font-family: 'Segoe UI', sans-serif;">
    
    <div style="height: 60%; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center;">
        <iframe src="https://www.youtube.com/embed/OkYXCAz_-Kg?autoplay=1&mute=1&controls=0&loop=1&playlist=OkYXCAz_-Kg" 
                style="width: 100%; height: 100%; border: none; opacity: 0.9; pointer-events: none; object-fit: contain;"></iframe>
        
        <div style="position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.95) 85%);">
            <div style="background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1.5px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; display: inline-block;">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
                    <span style="background: #e50914; color: #fff; padding: 2px 5px; font-size: 8px; font-weight: 900; border-radius: 2px;">NEW PROJECT</span>
                    <span style="color: rgba(255,255,255,0.6); font-size: 9px; font-weight: bold; letter-spacing: 1px;">COMING SOON</span>
                </div>
                <h2 style="color: #fff; margin: 3px 0; font-size: 20px; font-weight: 800; letter-spacing: 0.5px;">O CHINNA PREMA KATHA</h2>
                <p style="color: #bbb; font-size: 11px; margin: 0; font-style: italic;">A Story of Love & Destiny</p>
            </div>
        </div>
    </div>

    <div style="height: 40%; background: rgba(0,0,0,0.3); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center;">
        
        <p style="color: rgba(255, 255, 255, 0.4); font-size: 11px; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase;">Choose your profile</p>
        
        <div style="display: flex; gap: 25px;">
            <div onclick="unlockApp()" style="text-align: center; cursor: pointer;">
                <div style="width: 80px; height: 80px; 
                            background: rgba(255, 204, 0, 0.15); 
                            backdrop-filter: blur(10px); 
                            border: 1.5px solid rgba(255, 204, 0, 0.4); 
                            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
                            font-size: 38px; font-weight: 900; color: #ffcc00; transition: 0.3s;" 
                     onmouseover="this.style.background='rgba(255, 204, 0, 0.3)'; this.style.transform='scale(1.05)'"
                     onmouseout="this.style.background='rgba(255, 204, 0, 0.15)'; this.style.transform='scale(1)'">
                    G
                </div>
                <p style="color: #ffcc00; margin-top: 12px; font-size: 13px; font-weight: 600;">goutham</p>
            </div>
            
            <div style="text-align: center; opacity: 0.4;">
                <div style="width: 80px; height: 80px; 
                            background: rgba(255, 255, 255, 0.05); 
                            backdrop-filter: blur(10px); 
                            border: 1.5px solid rgba(255, 255, 255, 0.2); 
                            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
                            font-size: 18px; font-weight: 900; color: #fff;">
                    Kids
                </div>
                <p style="color: #aaa; margin-top: 12px; font-size: 13px;">Children</p>
            </div>
        </div>
    </div>
</div>

<style>
/* Smooth Fade-up Animation */
.fly-up { animation: flyUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
@keyframes flyUp { to { transform: translateY(-130px); opacity: 0; filter: blur(10px); } }

/* Profile Unlock Zoom */
.zoom-out-final { animation: finalZoom 0.9s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
@keyframes finalZoom { to { transform: scale(25); opacity: 0; visibility: hidden; } }
</style>

<script>
window.onload = function() {
    const intro = document.getElementById('intro-layer');
    const logo = document.getElementById('intro-logo');
    const quote = document.getElementById('intro-quote');
    const tudum = document.getElementById('tudum');
    const gate = document.getElementById('app-gate');

    // Start Sequence
    setTimeout(() => {
        logo.style.opacity = "1";
        logo.style.transform = "translateY(0) scale(1)";
        quote.style.opacity = "1";
        tudum.play().catch(e => {});
    }, 200);

    // Fly Up (Netflix Style Transition)
    setTimeout(() => {
        logo.classList.add('fly-up');
        quote.style.opacity = "0";
        setTimeout(() => {
            intro.style.display = "none";
            gate.style.display = "flex";
        }, 500);
    }, 2800); 
};

function unlockApp() {
    const gate = document.getElementById('app-gate');
    gate.classList.add('zoom-out-final');
    setTimeout(() => {
        gate.style.display = 'none';
        document.body.style.overflow = "auto";
    }, 800);
}
document.body.style.overflow = "hidden";
</script>
