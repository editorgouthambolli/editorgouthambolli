<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Movie Ticket</title>
<style>
    body {
        background: #0f172a;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .ticket {
        width: 350px;
        background: linear-gradient(135deg, #1e293b, #0f172a);
        color: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        overflow: hidden;
        position: relative;
    }

    .ticket::before,
    .ticket::after {
        content: "";
        position: absolute;
        width: 30px;
        height: 30px;
        background: #0f172a;
        border-radius: 50%;
    }

    .ticket::before {
        top: 50%;
        left: -15px;
        transform: translateY(-50%);
    }

    .ticket::after {
        top: 50%;
        right: -15px;
        transform: translateY(-50%);
    }

    .header {
        padding: 20px;
        text-align: center;
        border-bottom: 1px dashed #475569;
    }

    .header h2 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 2px;
        color: #facc15;
    }

    .movie {
        padding: 15px 20px;
    }

    .movie h3 {
        margin: 0;
        font-size: 22px;
        color: #fff;
    }

    .details {
        display: flex;
        justify-content: space-between;
        padding: 15px 20px;
        font-size: 14px;
        color: #cbd5f5;
    }

    .details div {
        text-align: center;
    }

    .barcode {
        padding: 20px;
        text-align: center;
    }

    .barcode img {
        width: 80%;
    }

    .footer {
        text-align: center;
        padding: 10px;
        font-size: 12px;
        color: #94a3b8;
    }
</style>
</head>
<body>

<div class="ticket">
    <div class="header">
        <h2>🎬 PREMIUM CINEMA</h2>
    </div>

    <div class="movie">
        <h3>Salaar</h3>
        <p>Screen 3 • Dolby Atmos</p>
    </div>

    <div class="details">
        <div>
            <strong>Date</strong><br>
            25 Mar
        </div>
        <div>
            <strong>Time</strong><br>
            7:30 PM
        </div>
        <div>
            <strong>Seat</strong><br>
            A12
        </div>
    </div>

    <div class="barcode">
        <img src="https://barcode.tec-it.com/barcode.ashx?data=PREMIUM123456&code=Code128" alt="barcode">
    </div>

    <div class="footer">
        Enjoy Your Movie 🍿
    </div>
</div>

</body>
</html>
