<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Cinematic Editor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --glass-bg: rgba(255, 255, 255, 0.05); /* గాజు లాంటి ఫినిష్ కోసం */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #1a1a1a, #050505); /* సినిమాటిక్ డార్క్ బ్యాక్‌గ్రౌండ్ */
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* Glass Finish Card */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* వెనుక ఉన్నది మసకగా కనిపించేలా (Glass Blur) */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            margin-bottom: 30px;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            text-align: center;
            margin-bottom: 10px;
        }

        .tagline {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header Section with Glass Finish -->
        <div class="glass-panel">
            <h1>GOUTHAM</h1>
            <div class="tagline">Cinematic Video Editor & Content Creator</div>
        </div>
    </div>

</body>
</html>
