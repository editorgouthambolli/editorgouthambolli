<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Cinematic Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 💜 + 🖤 సినిమాటిక్ బ్యాక్‌గ్రౌండ్ */
            background: radial-gradient(circle at top, #2e0249 0%, #000000 80%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding-top: 150px;
        }

        /* 💜🤍 మిక్స్డ్ మెటాలిక్ గ్లో టెక్స్ట్ */
        .name {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            margin: 0;
            background: linear-gradient(to bottom, #ffffff 30%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.8));
            animation: glow 2s ease-in-out infinite alternate;
        }

        .tagline {
            letter-spacing: 8px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-top: 10px;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5)); }
            to { filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.9)); }
        }
    </style>
</head>
<body>
    <header>
        <h1 class="name">Goutham Bolli</h1>
        <div class="tagline">The Romantic Cinematic Storyteller</div>
    </header>
</body>
</html>
