<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Step 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 🤍 వైట్ & 💜 పర్పుల్ సినిమాటిక్ గ్రేడియంట్ */
            background: radial-gradient(circle at top right, #ffffff, #f3e8ff, #d8b4fe, #581c87);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* గ్లాసీ ఫినిష్ కార్డ్ */
        .glass-header {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 60px 100px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
        }

        .name {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            /* పర్పుల్ & వైట్ మిక్స్ రేడియంట్ కలర్ */
            background: linear-gradient(to bottom, #ffffff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            /* మెటాలిక్ గ్లో ఎఫెక్ట్ */
            filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5));
        }

        .tagline {
            letter-spacing: 10px;
            font-size: 0.7rem;
            color: #4c1d95;
            text-transform: uppercase;
            margin-top: 15px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="glass-header">
        <h1 class="name">Goutham Bolli</h1>
        <div class="tagline">The Romantic Cinematic Storyteller</div>
    </div>

</body>
</html>
