
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goutham Bolli</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(180deg,#2b0a3d,#1a0129,#000);
    color:white;
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    position:fixed;
    width:100%;
    top:0;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

.logo{
    font-size:22px;
    font-weight:700;
    color:#e50914;
}

/* HERO */
.hero{
    margin-top:70px;
    padding:20px;
}

.banner{
    height:200px;
    border-radius:20px;
    background:url('banner.jpg') center/cover;
    position:relative;
}

.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    background:linear-gradient(transparent,black);
    border-radius:20px;
}

.overlay h1{
    font-size:24px;
}

.btns{
    margin-top:10px;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    margin-right:10px;
    cursor:pointer;
}

.play{
    background:white;
    color:black;
}

.list{
    background:rgba(255,255,255,0.2);
    color:white;
}

/* ROW */
.row{
    margin:20px;
}

.row h2{
    margin-bottom:10px;
}

.cards{
    display:flex;
    overflow-x:auto;
    gap:10px;
}

.card{
    min-width:140px;
    border-radius:10px;
    overflow:hidden;
    position:relative;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

/* BOTTOM NAV */
.bottom{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:black;
    padding:10px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">N</div>
    <div>🔍</div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="banner">
        <div class="overlay">
            <h1>Goutham Bolli ✔</h1>
            <p>Editor & Content Writer</p>

            <div class="btns">
                <button class="btn play">▶ Play</button>
                <button class="btn list">+ My List</button>
            </div>
        </div>
    </div>
</div>

<!-- ROW -->
<div class="row">
    <h2>Continue Watching</h2>
    <div class="cards">
        <div class="card"><img src="thumb1.jpg"></div>
        <div class="card"><img src="thumb2.jpg"></div>
        <div class="card"><img src="thumb3.jpg"></div>
    </div>
</div>

<div class="row">
    <h2>My Edits</h2>
    <div class="cards">
        <div class="card"><img src="thumb4.jpg"></div>
        <div class="card"><img src="thumb5.jpg"></div>
    </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom">
    <div>🏠</div>
    <div>🎬</div>
    <div>📱</div>
    <div>👤</div>
</div>

</body>
</html>
