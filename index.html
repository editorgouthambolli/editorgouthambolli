<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goutham Bolli</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(180deg,#f3e8ff,#d8b4fe,#a855f7);
}

/* HEADER */
.header{
    text-align:center;
    padding:40px 20px;
}

.header h1{
    font-size:40px;
    color:#6b21a8;
}

/* CARD */
.card{
    margin:20px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(20px);
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* FOLDERS */
.folders{
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:10px;
}

.folder{
    min-width:120px;
    padding:15px;
    text-align:center;
    border-radius:15px;
    background:white;
    cursor:pointer;
    transition:0.3s;
}

.folder:hover{
    transform:scale(1.05);
    background:#f3e8ff;
}

/* VIDEO PLAYER */
.player{
    display:none;
    margin:20px;
}

.player video{
    width:100%;
    border-radius:15px;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <h1>GOUTHAM BOLLI ✔</h1>
    <p>Editor & Content Writer</p>
</div>

<!-- FOLDERS -->
<div class="card">
    <h2>📂 Categories</h2>
    <div class="folders">
        <div class="folder" onclick="openFolder(1)">🎬 Short Films</div>
        <div class="folder" onclick="openFolder(2)">📱 Reels</div>
        <div class="folder" onclick="openFolder(3)">🎥 Vlogs</div>
        <div class="folder" onclick="openFolder(4)">⚡ Shorts</div>
    </div>
</div>

<!-- VIDEO SECTION -->
<div id="videos" class="player">
    <div class="card">
        <h2>🎥 Project Works</h2>

        <!-- 4 VIDEOS -->
        <video src="video1.mp4" controls></video><br><br>
        <video src="video2.mp4" controls></video><br><br>
        <video src="video3.mp4" controls></video><br><br>
        <video src="video4.mp4" controls></video>

    </div>
</div>

<script>
function openFolder(id){
    document.getElementById("videos").style.display="block";
}
</script>

</body>
</html>
