<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Goutham Bolli | Cinematic Portfolio</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --glass-bg: rgba(255, 255, 255, 0.05); /* గాజు లాంటి ఫినిష్ */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #1a1a1a, #050505); /* సినిమాటిక్ డార్క్ బ్యాక్‌గ్రౌండ్ */
            color: #fff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }

        /* Glass Finish Card */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); /* గ్లాస్ బ్లర్ ఎఫెక్ట్ */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 50px 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(1.4rem, 5vw, 2.5rem);
            color: var(--gold);
            letter-spacing: 6px;
            margin: 0;
            text-transform: uppercase;
        }

        h1 span {
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .tagline {
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
            font-size: 0.85rem;
            font-weight: 400;
        }

        /* Divider */
        .divider {
            width: 50px;
            height: 2px;
            background: var(--gold);
            margin: 30px auto;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header Section with Glass Finish -->
        <div class="glass-panel">
            <h1>EDITOR <span>GOUTHAM BOLLI</span></h1>
            <div class="divider"></div>
            <div class="tagline">Visual Storyteller & Cinematic Content Creator</div>
        </div>
    </div>

</body>
</html>
