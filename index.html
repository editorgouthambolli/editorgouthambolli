<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Cinematic Editor</title>
    <style>
        /* 🎨 నువ్వు అడిగిన పక్కా వైట్ & పర్పుల్ గ్రేడియంట్ సెట్టింగ్స్ */
        :root { 
            --purple-primary: #7a4ed9; 
            --purple-light: #f3efff; 
            --text-main: #333;
        }

        body, html { 
            margin: 0; padding: 0; 
            /* 🎨 ఫోటోలో ఉన్నట్టు పైన వైట్, కింద పర్పుల్ గ్రేడియంట్ */
            background: linear-gradient(180deg, #ffffff 0%, #eee8ff 50%, #d8c4ff 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* 1. 🎬 చిన్న సినిమాటిక్ ఇంట్రో */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .g-logo { 
            font-size: 24px; font-weight: bold; color: #fff; 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7); 
            opacity: 0; animation: fadeInZoom 1.5s forwards; 
        }
        @keyframes fadeInZoom { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 2. 📱 వన్-బై-వన్ బాక్సులు (White Glass on Purple Gradient) */
        #main-site { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
        
        .device-box { 
            background: rgba(255, 255, 255, 0.7); /* పారదర్శక వైట్ గ్లాస్ */
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px; margin-bottom: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(122, 78, 217, 0.15); /* పర్పుల్ షాడో */
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .box-tag { 
            background: var(--purple-primary); color: #fff; font-size: 10px; 
            padding: 4px 15px; border-radius: 20px; font-weight: bold; 
            display: inline-block; margin-bottom: 12px;
        }
        .box-text { font-size: 14px; line-height: 1.6; color: #555; margin: 0; }

        /* 🛠️ స్కిల్స్ గ్రిడ్ */
        .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .skill-item { background: #fff; padding: 12px; border-radius: 12px; font-size: 12px; border: 1px solid #eee; text-align: center; }

        /* 3. 📺 ఫుల్ స్క్రీన్ ప్లేయర్ (Zero Gap) */
        .video-wrapper { 
            width: 100vw; height: 100vh; margin: 30px -20px; 
            background: #000; position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body onclick="enableSound()">

    <div id="intro-layer">
        <div class="g-logo">GOUTHAM BOLLI</div>
    </div>

    <div id="main-site">
        
        <div class="device-box">
            <span class="box-tag">MY VISION</span>
            <p class="box-text">నేను కేవలం వీడియోలను కట్ చేయను, ఒక అనుభవాన్ని సృష్టిస్తాను. ప్రతి ఫ్రేమ్ వెనుక ఒక ఎమోషన్ ఉండేలా చూస్తాను.</p>
        </div>

        <div class="device-box">
            <span class="box-tag">TECHNICAL ARSENAL</span>
            <div class="skills-grid">
                <div class="skill-item">Adobe Premiere Pro</div>
                <div class="skill-item">After Effects</div>
                <div class="skill-item">Alight Motion</div>
                <div class="skill-item">KineMaster</div>
            </div>
        </div>

        <div class="device-box">
            <span class="box-tag">THE JOURNEY</span>
            <p class="box-text">Started with a smartphone in 2018. 7 years of storytelling.</p>
        </div>

        <div style="text-align:center; margin-top:40px;"><span class="box-tag" style="background:#4a148c;">📁 SELECTED WORKS</span></div>
        
        <div class="video-wrapper">
            <iframe id="main-video" src="https://www.youtube.com/embed/qapXhJJNAy8?enablejsapi=1&autoplay=1&mute=1&loop=1"></iframe>
        </div>
    </div>

    <script>
        // ఇంట్రో ట్రాన్సిషన్
        setTimeout(() => {
            document.getElementById('intro-layer').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
        }, 3500);

        // 🔊 సౌండ్ ఫిక్స్
        function enableSound() {
            const iframe = document.getElementById('main-video');
            let src = iframe.src;
            if (src.includes("mute=1")) {
                iframe.src = src.replace("mute=1", "mute=0");
            }
        }
    </script>
</body>
</html>
