<<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Cinematic Editor</title>
    <style>
        :root { --purple: #9d72ff; --glass: rgba(255, 255, 255, 0.08); }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }

        /* INTRO STYLE */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .g-name { font-size: 24px; color: var(--purple); text-shadow: 0 0 10px var(--purple); opacity: 0; animation: fadeIn 1.2s forwards; }
        .quote { font-size: 11px; color: #777; margin-top: 8px; opacity: 0; animation: fadeIn 1.2s 1.5s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* CONTENT STYLE */
        #content-layer { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .glass-box { background: var(--glass); backdrop-filter: blur(20px); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .tag { background: var(--purple); font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: bold; display: inline-block; margin-bottom: 8px; }
        
        /* FULL PLAYER - ZERO GAP */
        .video-section { width: 100vw; height: 100vh; margin: 20px -20px; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body onclick="unmuteVideo()">

    <div id="intro-layer">
        <div class="g-name">G | GOUTHAM EDITOR</div>
        <div class="quote">"Every frame tells a story..."</div>
    </div>

    <div id="content-layer">
        <div class="glass-box"><span class="tag">SUMMARY</span><p style="font-size:12px;">Cinematic Storyteller.</p></div>
        <div class="glass-box"><span class="tag">JOURNEY</span><p style="font-size:12px;">Smartphone to Professional Masterpieces.</p></div>
        <div class="glass-box"><span class="tag">BREAKTHROUGH</span><p style="font-size:12px;">2022 Transformation.</p></div>
        <div class="glass-box"><span class="tag">PASSION</span><p style="font-size:12px;">Creativity has no limits.</p></div>
        <div class="glass-box"><span class="tag">TECHNICAL</span><p style="font-size:12px;">Pr, Ae, Ai, Alight Motion.</p></div>

        <div class="video-section">
            <iframe id="main-video" src="https://www.youtube.com/embed/qapXhJJNAy8?enablejsapi=1&autoplay=1&mute=1&loop=1"></iframe>
        </div>
    </div>

    <script>
        // ఇంట్రో అయ్యాక కంటెంట్ చూపించడం
        setTimeout(() => {
            document.getElementById('intro-layer').style.display = 'none';
            document.getElementById('content-layer').style.display = 'block';
        }, 4000);

        // సౌండ్ ఫిక్స్ ఫంక్షన్
        function unmuteVideo() {
            const iframe = document.getElementById('main-video');
            let src = iframe.src;
            if (src.includes("mute=1")) {
                // మ్యూట్ తీసేసి మళ్ళీ లోడ్ చేస్తుంది
                iframe.src = src.replace("mute=1", "mute=0");
            }
        }
    </script>
</body>
</html>
