<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Bolli | Cinematic Artist</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #e50914;
            --glow-white: #ffffff;
            --glow-purple: #b026ff;
            --deep-purple: #1a0129;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

        body {
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* --- THE GLOW EFFECT YOU NOTICED --- */
        .white-glow {
            position: fixed;
            top: -100px;
            left: -50px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(176,38,255,0.3) 50%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.6; }
            to { transform: scale(1.2); opacity: 0.9; }
        }

        /* --- GRID BACKGROUND --- */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-0758328f773b/86071465-4d7a-4467-bc6d-0e31804f3b5f/IN-en-20220502-popsignuptwoweeks-perspective_alpha_website_small.jpg');
            background-size: cover;
            opacity: 0.15;
            z-index: -2;
        }

        /* --- NAV --- */
        .nav {
            display: flex; justify-content: space-between; padding: 20px 30px;
            position: fixed; width: 100%; top: 0; z-index: 100;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(15px);
        }
        .logo { font-size: 22px; font-weight: 700; color: white; }
        .logo span { color: var(--accent); font-weight: 900; font-size: 28px; }

        /* --- HERO SECTION --- */
        .hero { 
            margin-top: 150px; padding: 20px; text-align: left; 
            max-width: 600px; margin-left: 30px;
        }
        .hero h1 { 
            font-size: 55px; font-weight: 700; line-height: 1.1;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
        .hero p { color: #ccc; margin-top: 10px; font-size: 18px; letter-spacing: 2px; }

        /* --- CATEGORIES --- */
        .section-title { margin: 60px 30px 20px; font-size: 22px; border-left: 4px solid var(--accent); padding-left: 15px; }
        .folders {
            display: flex; gap: 20px; overflow-x: auto; padding: 10px 30px;
            scrollbar-width: none;
        }
        .folder {
            min-width: 160px; height: 200px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); cursor: pointer;
            transition: 0.4s;
        }
        .folder:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--glow-white);
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        /* --- PLAYER AREA --- */
        .video-player {
            display: none; padding: 40px 30px;
        }
        .video-card {
            background: #111; border-radius: 20px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        video { width: 100%; border-radius: 15px; }

        /* --- BOTTOM NAV --- */
        .bottom {
            position: fixed; bottom: 0; width: 100%; display: flex;
            justify-content: space-around; background: black; padding: 15px;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="white-glow"></div>
    <div class="bg-grid"></div>

    <div class="nav">
        <div class="logo"><span>N</span> GOUTHAM BOLLI</div>
        <div>🔍</div>
    </div>

    <div class="hero">
        <h1>Goutham<br>Bolli ✔</h1>
        <p>CINEMATIC EDITOR</p>
    </div>

    <h2 class="section-title">My Projects</h2>
    <div class="folders">
        <div class="folder" onclick="play('Short Films')">🎬<br><br>Short Films</div>
        <div class="folder" onclick="play('Wedding')">💍<br><br>Wedding</div>
        <div class="folder" onclick="play('Reels')">📱<br><br>Reels</div>
        <div class="folder" onclick="play('Shorts')">⚡<br><br>Shorts</div>
    </div>

    <div id="player" class="video-player">
        <h2 id="title" style="margin-bottom: 20px; color: var(--glow-purple);">Selected Work</h2>
        <div class="video-card">
            <video src="video.mp4" controls></video>
        </div>
    </div>

    <div class="bottom">
        <div>🏠</div>
        <div>🎬</div>
        <div>📱</div>
        <div>👤</div>
    </div>

    <script>
        function play(name) {
            document.getElementById("player").style.display = "block";
            document.getElementById("title").innerText = "📂 " + name;
            document.getElementById("player").scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
