backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "My Projects"
    folder: "content/projects"
    create: true
    slug: "{{title}}"
    fields:
      - {label: "Project Title", name: "title", widget: "string"}
      - {label: "Video URL", name: "video_url", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Teaser", "Trailer", "Title Design", "Short Film"]}
      - {label: "Thumbnail Image", name: "image", widget: "image"}
      - {label: "Description", name: "body", widget: "markdown"}
