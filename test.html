<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutham Editor | Theme Test</title>
    <style>
        /* 1. Base Colors & Layout */
        body {
            margin: 0;
            padding: 0;
            background-color: #050509; /* Dark Base */
            /* Purple Light Effect */
            background-image: radial-gradient(circle at 50% 50%, rgba(160, 32, 240, 0.1) 0%, transparent 80%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        /* 2. Glassy Box (Little bit effect) */
        .glass-box {
            width: 80%;
            height: 200px;
            background: rgba(255, 255, 255, 0.05); /* White Glass */
            backdrop-filter: blur(10px); /* Glass Blur */
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle White Border */
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(160, 32, 240, 0.2); /* Purple Glow */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text {
            color: #ffffff;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .purple-text {
            color: #a020f0; /* Purple Color */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <div class="text">White & <span class="purple-text">Purple</span> Glassy Theme</div>
    </div>

</body>
</html>
